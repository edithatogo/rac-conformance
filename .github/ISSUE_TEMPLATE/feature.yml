name: Feature proposal
description: Propose an evidence-backed capability with a named consumer
title: "proposal: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and consumer
      description: Identify the concrete problem and the consumer that needs it.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Proposed outcome
      description: Describe observable behavior and acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link existing consumers, failures, measurements, or primary sources.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and non-goals
    validations:
      required: true
