name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: State the incorrect behavior and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include minimal inputs, exact commands, versions, and observed output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and sources
      description: Link primary sources and identify fixture provenance.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Safety boundaries
      options:
        - label: This report does not contain secrets or sensitive personal data.
          required: true
        - label: Any legal or policy assertion is linked to a primary source or marked unverified.
          required: true
