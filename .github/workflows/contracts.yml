name: Contracts

on:
  push:
    paths:
      - "contracts/**"
      - "harness/**"
      - "external/axiom/**"
      - "Makefile"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "harness/**"
      - "external/axiom/**"
      - "Makefile"
      - ".github/workflows/contracts.yml"

permissions:
  contents: read

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install package
        run: uv pip install --system -e contracts/tools

      - name: Ruff
        run: cd contracts/tools && uv run --with ruff ruff check .

      - name: Pytest with coverage
        run: cd contracts/tools && uv run --with pytest --with pytest-cov pytest --cov=pic_contracts --cov-report=term-missing

      - name: Validate example corpora
        run: cd contracts/tools && uv run python -m pic_contracts.validate_examples ../../contracts

      - name: Harness tests
        run: PYTHONPATH=harness:contracts/tools/src uv run --with pytest --with jsonschema pytest harness/tests

      - name: Axiom live-suite smoke check
        run: PYTHONPATH=harness:contracts/tools/src uv run --with jsonschema python external/axiom/ci_check.py
