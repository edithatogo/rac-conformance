name: Contracts

on:
  push:
    paths:
      - "contracts/**"
      - "harness/**"
      - "external/axiom/**"
      - "Makefile"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "harness/**"
      - "external/axiom/**"
      - "Makefile"
      - ".github/workflows/contracts.yml"

permissions:
  contents: read

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install package
        run: uv pip install --system -e contracts/tools

      - name: Ruff
        run: cd contracts/tools && uv run --with ruff ruff check .

      - name: Pytest with coverage
        run: cd contracts/tools && uv run --with pytest --with pytest-cov pytest --cov=pic_contracts --cov-report=term-missing

      - name: Validate example corpora
        run: cd contracts/tools && uv run python -m pic_contracts.validate_examples ../../contracts

      - name: Harness tests
        run: PYTHONPATH=harness:contracts/tools/src uv run --with pytest --with jsonschema pytest harness/tests

      - name: Axiom live-suite smoke check
        run: PYTHONPATH=harness:contracts/tools/src uv run --with jsonschema python external/axiom/ci_check.py
